<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaugeDashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://kmas-hub.github.io/GaugeDashboard/">
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="overlay" class="overlay"></div>
        <nav id="nav-menu" class="nav" aria-hidden="true">
            <ul class="nav-list">
                <li class="nav-item"><a href="./" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="https://kmas-hub.github.io/DataDashboard/" class="nav-link">DataDashboard</a></li>
                <li class="nav-item">
                    <button id="login-btn" class="nav-link login-btn-nav">LogIn</button>
                </li>
            </ul>
        </nav>

        <div class="main-content-wrapper">
            <header class="header">
                <div class="header-left">
                    <button class="menu-button" aria-label="Menu" aria-controls="nav-menu" aria-expanded="false">
                        <span class="line"></span>
                        <span class="line"></span>
                        <span class="line"></span>
                    </button>
                    <a href="./"><img src="logo.png" alt="Kawahara'sFarmlogo" class="logo"></a>
                </div>
                <div class="header-right">
                    <div id="clock" class="clock"></div>
                    <label class="theme-switch" for="checkbox-theme" aria-label="テーマ切り替え">
                        <input type="checkbox" id="checkbox-theme">
                        <span class="slider"></span>
                    </label>
                </div>
            </header>

            <div id="main-content" style="display:none;" class="content-area">
                <section class="stats-section">
                    <h2>24h平均</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>House 1</h3>
                            <p>気温: <span id="temp1n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil1n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 2</h3>
                            <p>気温: <span id="temp2n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil2n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 3</h3>
                            <p>気温: <span id="temp3n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil3n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 4</h3>
                            <p>気温: <span id="temp4n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil4n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 5</h3>
                            <p>気温: <span id="temp5n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil5n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 6</h3>
                            <p>気温: <span id="temp6n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil6n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 7</h3>
                            <p>気温: <span id="temp7n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil7n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 8</h3>
                            <p>気温: <span id="temp8n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil8n-avg" class="sensor-val">--</span></p>
                        </div>
                        <div class="stat-card">
                            <h3>House 9</h3>
                            <p>気温: <span id="temp9n-avg" class="sensor-val">--</span></p>
                            <p>地温: <span id="soil9n-avg" class="sensor-val">--</span></p>
                        </div>
                    </div>
                </section>

                <section class="chart-section">
                    <div class="chart-block">
                        <canvas id="multchart"></canvas>
                    </div>

                    <div class="chart-controls">
                        <div class="control-group">
                            <label for="y-min">Y軸 最小値:</label>
                            <input type="number" id="y-min" value="10" step="5">
                            <span>°C</span>
                        </div>
                        <div class="control-group">
                            <label for="y-max">Y軸 最大値:</label>
                            <input type="number" id="y-max" value="40" step="5">
                            <span>°C</span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
